name: CI

"on":
  pull_request:
  push:
    branches: [main, master]
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y git gcc clang gtk4-devel libadwaita-devel pkgconf-pkg-config \
            rust cargo clippy rustfmt

      - name: Checkout
        uses: actions/checkout@v4

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo test
        run: cargo test --workspace

  rpm:
    name: rpm
    needs: check
    runs-on: ubuntu-latest
    container: fedora:latest
    permissions:
      contents: write
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y git gcc clang gtk4-devel libadwaita-devel pkgconf-pkg-config \
            rust cargo rpm-build

      - name: Checkout
        uses: actions/checkout@v4

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release -p sirius-installer

      - name: Build RPM package
        run: cargo generate-rpm -p crates/sirius-installer

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sirius-rpm
          path: target/generate-rpm/*.rpm
          if-no-files-found: error

      - name: Attach RPM to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/generate-rpm/*.rpm
